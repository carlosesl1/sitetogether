name: Deploy static site to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:
  repository_dispatch:
    types:
      - wordpress_content_changed
  schedule:
    # Daily fallback in case the WordPress dispatch fails.
    - cron: "17 8 * * *"

concurrency:
  group: hostinger-static-site-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: hostinger
    timeout-minutes: 30
    env:
      HOSTINGER_FTP_PROTOCOL: ${{ secrets.HOSTINGER_FTP_PROTOCOL || vars.HOSTINGER_FTP_PROTOCOL || 'sftp' }}
      HOSTINGER_FTP_PORT: ${{ secrets.HOSTINGER_FTP_PORT || vars.HOSTINGER_FTP_PORT || 65002 }}
      HOSTINGER_FTP_SERVER_DIR: "./"
      HOSTINGER_DRY_RUN: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Validate Hostinger deploy configuration
        run: |
          missing=0
          for name in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not configured in GitHub Actions secrets for the hostinger environment."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Hostinger deploy configuration is present. Values are intentionally hidden."
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}

      - name: Inspect Hostinger FTP paths before deploy
        continue-on-error: true
        run: |
          python - <<'PY'
          import os
          from ftplib import FTP, FTP_TLS, error_perm

          protocol = os.environ.get("HOSTINGER_FTP_PROTOCOL", "sftp").lower()
          port = int(os.environ.get("HOSTINGER_FTP_PORT", "65002"))

          if protocol == "sftp":
              print("Skipping FTP path inspection because HOSTINGER_FTP_PROTOCOL=sftp. The lftp deploy step will use SFTP.")
              raise SystemExit(0)

          def connect():
              ftp_cls = FTP_TLS if protocol.startswith("ftps") else FTP
              ftp = ftp_cls(timeout=30)
              ftp.connect(os.environ["HOSTINGER_FTP_SERVER"], port)
              ftp.login(os.environ["HOSTINGER_FTP_USERNAME"], os.environ["HOSTINGER_FTP_PASSWORD"])
              if isinstance(ftp, FTP_TLS):
                  ftp.prot_p()
              return ftp

          ftp = connect()

          paths = [
              ".",
              "public_html",
              "public_html/public_html",
              "domains",
              "domains/togetherprivacy.tech",
              "domains/togetherprivacy.tech/public_html",
          ]

          targets = [
              "blog.html",
              "data/blog-sync.json",
              "blog/caso-claro-serasa-anpd-compartilhamento-dados.html",
              "codex-deploy-marker.txt",
          ]

          for path in paths:
              print(f"--- FTP path: {path}")
              try:
                  ftp.cwd("/")
                  ftp.cwd(path)
                  names = ftp.nlst()
                  print("entries:", ", ".join(names[:25]))
                  for target in targets:
                      try:
                          size = ftp.size(target)
                          print(f"target {target}: {size} bytes")
                      except Exception as exc:
                          print(f"target {target}: missing ({exc.__class__.__name__})")
              except error_perm as exc:
                  print(f"unavailable: {exc}")
              except Exception as exc:
                  print(f"error: {exc.__class__.__name__}: {exc}")

          ftp.quit()
          PY
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_PROTOCOL: ${{ env.HOSTINGER_FTP_PROTOCOL }}
          HOSTINGER_FTP_PORT: ${{ env.HOSTINGER_FTP_PORT }}

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://togetherprivacy.tech
          WORDPRESS_API_URL: https://togetherprivacy.tech/wp-json/wp/v2

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy out directory to Hostinger
        shell: bash
        run: |
          set -euo pipefail

          protocol="${HOSTINGER_FTP_PROTOCOL,,}"
          remote_dir="${HOSTINGER_FTP_SERVER_DIR%/}"
          if [ -z "$remote_dir" ]; then
            remote_dir="."
          fi

          case "$protocol" in
            ftp|ftps|ftps-legacy|sftp) ;;
            *)
              echo "::error::Unsupported HOSTINGER_FTP_PROTOCOL '$HOSTINGER_FTP_PROTOCOL'. Use ftp, ftps, ftps-legacy, or sftp."
              exit 1
              ;;
          esac

          if [[ "$remote_dir" == *\"* ]]; then
            echo "::error::HOSTINGER_FTP_SERVER_DIR cannot contain double quotes."
            exit 1
          fi

          case "$protocol" in
            ftps-legacy) lftp_protocol="ftps" ;;
            *) lftp_protocol="$protocol" ;;
          esac

          lftp_url="${lftp_protocol}://${HOSTINGER_FTP_SERVER}:${HOSTINGER_FTP_PORT}"
          lftp_settings=$'set cmd:fail-exit yes\nset net:timeout 30\nset net:max-retries 2\nset net:reconnect-interval-base 5\nset ftp:passive-mode true\nset sftp:auto-confirm yes'

          case "$protocol" in
            ftp)
              lftp_settings+=$'\nset ftp:ssl-allow false'
              ;;
            ftps|ftps-legacy)
              lftp_settings+=$'\nset ftp:ssl-force true\nset ftp:ssl-protect-data true'
              ;;
          esac

          dry_run_flag=""
          if [ "$HOSTINGER_DRY_RUN" = "true" ]; then
            dry_run_flag="--dry-run"
          fi

          mirror_command="mirror --reverse --delete --verbose=1 --parallel=3 $dry_run_flag"
          mirror_command+=" --exclude-glob '.git*'"
          mirror_command+=" --exclude-glob '.git*/**'"
          mirror_command+=" --exclude-glob 'node_modules/**'"
          mirror_command+=" --exclude-glob 'wp-admin/**'"
          mirror_command+=" --exclude-glob 'wp-content/**'"
          mirror_command+=" --exclude-glob 'wp-includes/**'"
          mirror_command+=" --exclude-glob 'index.php'"
          mirror_command+=" --exclude-glob 'wp-config.php'"
          mirror_command+=" --exclude-glob 'wp-*.php'"
          mirror_command+=" --exclude-glob 'xmlrpc.php'"
          mirror_command+=" --exclude-glob 'license.txt'"
          mirror_command+=" --exclude-glob 'readme.html'"
          mirror_command+=" --exclude-glob '.user.ini'"
          mirror_command+=" --exclude-glob 'public_html/**'"
          mirror_command+=" --exclude-glob 'public_html'"
          mirror_command+=" --exclude-glob 'domains/**'"
          mirror_command+=" --exclude-glob 'domains'"
          mirror_command+=" --exclude-glob '.ssh/**'"
          mirror_command+=" --exclude-glob '.ssh'"
          mirror_command+=" --exclude-glob '.logs/**'"
          mirror_command+=" --exclude-glob '.logs'"
          mirror_command+=" --exclude-glob '.wp-cli/**'"
          mirror_command+=" --exclude-glob '.wp-cli'"
          mirror_command+=" --exclude-glob '.api_token'"
          mirror_command+=" --exclude-glob '.profile'"
          mirror_command+=" --exclude-glob '.filebrowser'"
          mirror_command+=" ./out/ \"$remote_dir\""

          echo "Deploying ./out/ to Hostinger over ${protocol} on port ${HOSTINGER_FTP_PORT}."
          lftp -u "$HOSTINGER_FTP_USERNAME","$HOSTINGER_FTP_PASSWORD" "$lftp_url" -e "$lftp_settings"$'\n'"$mirror_command"$'\n'"bye"
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_PROTOCOL: ${{ env.HOSTINGER_FTP_PROTOCOL }}
          HOSTINGER_FTP_PORT: ${{ env.HOSTINGER_FTP_PORT }}
          HOSTINGER_FTP_SERVER_DIR: ${{ env.HOSTINGER_FTP_SERVER_DIR }}
          HOSTINGER_DRY_RUN: ${{ env.HOSTINGER_DRY_RUN }}

      - name: Verify uploaded files over lftp
        shell: bash
        run: |
          set -euo pipefail

          protocol="${HOSTINGER_FTP_PROTOCOL,,}"
          remote_dir="${HOSTINGER_FTP_SERVER_DIR%/}"
          if [ -z "$remote_dir" ]; then
            remote_dir="."
          fi

          case "$protocol" in
            ftp|ftps|ftps-legacy|sftp) ;;
            *)
              echo "::error::Unsupported HOSTINGER_FTP_PROTOCOL '$HOSTINGER_FTP_PROTOCOL'. Use ftp, ftps, ftps-legacy, or sftp."
              exit 1
              ;;
          esac

          case "$protocol" in
            ftps-legacy) lftp_protocol="ftps" ;;
            *) lftp_protocol="$protocol" ;;
          esac

          lftp_url="${lftp_protocol}://${HOSTINGER_FTP_SERVER}:${HOSTINGER_FTP_PORT}"
          lftp_settings=$'set cmd:fail-exit yes\nset net:timeout 30\nset net:max-retries 2\nset net:reconnect-interval-base 5\nset ftp:passive-mode true\nset sftp:auto-confirm yes'

          case "$protocol" in
            ftp)
              lftp_settings+=$'\nset ftp:ssl-allow false'
              ;;
            ftps|ftps-legacy)
              lftp_settings+=$'\nset ftp:ssl-force true\nset ftp:ssl-protect-data true'
              ;;
          esac

          remote_prefix=""
          if [ "$remote_dir" != "." ]; then
            remote_prefix="${remote_dir}/"
          fi

          targets=(
            "blog.html"
            "data/blog-sync.json"
            "blog/caso-claro-serasa-anpd-compartilhamento-dados.html"
            "codex-deploy-marker.txt"
          )

          for target in "${targets[@]}"; do
            remote_path="${remote_prefix}${target}"
            local_file="$(mktemp)"
            lftp -u "$HOSTINGER_FTP_USERNAME","$HOSTINGER_FTP_PASSWORD" "$lftp_url" -e "$lftp_settings"$'\n'"get \"$remote_path\" -o \"$local_file\""$'\n'"bye"
            python - "$target" "$local_file" <<'PY'
          import hashlib
          import re
          import sys

          target = sys.argv[1]
          local_file = sys.argv[2]
          data = open(local_file, "rb").read()
          text = data[:200000].decode("utf-8", errors="ignore")
          digest = hashlib.sha256(data).hexdigest()[:16]
          build = re.search(r"<!DOCTYPE html><!--([^>]+)--><html", text)
          details = [
              f"bytes={len(data)}",
              f"sha256={digest}",
              f"has_caso={'caso-claro-serasa-anpd-compartilhamento-dados' in text}",
          ]
          if build:
              details.append(f"build_id={build.group(1)}")
          if target == "codex-deploy-marker.txt":
              details.append(f"content={text.strip()}")
          print(f"{target}: " + " ".join(details))
          PY
            rm -f "$local_file"
          done
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_PROTOCOL: ${{ env.HOSTINGER_FTP_PROTOCOL }}
          HOSTINGER_FTP_PORT: ${{ env.HOSTINGER_FTP_PORT }}
          HOSTINGER_FTP_SERVER_DIR: ${{ env.HOSTINGER_FTP_SERVER_DIR }}

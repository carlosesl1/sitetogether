name: Deploy static site to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:
  repository_dispatch:
    types:
      - wordpress_content_changed
  schedule:
    # Daily fallback in case the WordPress dispatch fails.
    - cron: "17 8 * * *"

concurrency:
  group: hostinger-static-site-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: hostinger
    timeout-minutes: 30
    env:
      HOSTINGER_FTP_PROTOCOL: ${{ secrets.HOSTINGER_FTP_PROTOCOL || vars.HOSTINGER_FTP_PROTOCOL || 'ftp' }}
      HOSTINGER_FTP_PORT: ${{ secrets.HOSTINGER_FTP_PORT || vars.HOSTINGER_FTP_PORT || 21 }}
      HOSTINGER_FTP_SERVER_DIR: "./"
      HOSTINGER_DRY_RUN: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Validate Hostinger deploy configuration
        run: |
          missing=0
          for name in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not configured in GitHub Actions secrets for the hostinger environment."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Hostinger deploy configuration is present. Values are intentionally hidden."
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}

      - name: Inspect Hostinger FTP paths before deploy
        run: |
          python - <<'PY'
          import os
          from ftplib import FTP, error_perm

          ftp = FTP(os.environ["HOSTINGER_FTP_SERVER"], timeout=20)
          ftp.login(os.environ["HOSTINGER_FTP_USERNAME"], os.environ["HOSTINGER_FTP_PASSWORD"])

          paths = [
              ".",
              "public_html",
              "public_html/public_html",
              "domains",
              "domains/togetherprivacy.tech",
              "domains/togetherprivacy.tech/public_html",
          ]

          targets = [
              "blog.html",
              "data/blog-sync.json",
              "blog/caso-claro-serasa-anpd-compartilhamento-dados.html",
              "codex-deploy-marker.txt",
          ]

          for path in paths:
              print(f"--- FTP path: {path}")
              try:
                  ftp.cwd("/")
                  ftp.cwd(path)
                  names = ftp.nlst()
                  print("entries:", ", ".join(names[:25]))
                  for target in targets:
                      try:
                          size = ftp.size(target)
                          print(f"target {target}: {size} bytes")
                      except Exception as exc:
                          print(f"target {target}: missing ({exc.__class__.__name__})")
              except error_perm as exc:
                  print(f"unavailable: {exc}")
              except Exception as exc:
                  print(f"error: {exc.__class__.__name__}: {exc}")

          ftp.quit()
          PY
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://togetherprivacy.tech
          WORDPRESS_API_URL: https://togetherprivacy.tech/wp-json/wp/v2

      - name: Deploy out directory to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ${{ env.HOSTINGER_FTP_PROTOCOL }}
          port: ${{ env.HOSTINGER_FTP_PORT }}
          local-dir: ./out/
          server-dir: ${{ env.HOSTINGER_FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-static-site-webroot-v1.json
          dry-run: ${{ env.HOSTINGER_DRY_RUN }}
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/wp-admin/**
            **/wp-content/**
            **/wp-includes/**
            **/index.php
            **/wp-config.php
            **/wp-*.php
            **/xmlrpc.php
            **/license.txt
            **/readme.html
            **/.user.ini
            **/public_html/**
            **/public_html
            **/domains/**
            **/domains
            **/.ssh/**
            **/.ssh
            **/.logs/**
            **/.logs
            **/.wp-cli/**
            **/.wp-cli
            **/.api_token
            **/.profile
            **/.filebrowser

      - name: Verify uploaded files over FTP
        run: |
          python - <<'PY'
          import hashlib
          import os
          import re
          from ftplib import FTP, error_perm

          ftp = FTP(os.environ["HOSTINGER_FTP_SERVER"], timeout=20)
          ftp.login(os.environ["HOSTINGER_FTP_USERNAME"], os.environ["HOSTINGER_FTP_PASSWORD"])

          paths = [
              ".",
              "public_html",
              "public_html/public_html",
              "domains/togetherprivacy.tech/public_html",
          ]

          targets = [
              "blog.html",
              "data/blog-sync.json",
              "blog/caso-claro-serasa-anpd-compartilhamento-dados.html",
              "codex-deploy-marker.txt",
          ]

          def fetch(path, target):
              ftp.cwd("/")
              ftp.cwd(path)
              chunks = []
              ftp.retrbinary(f"RETR {target}", chunks.append)
              return b"".join(chunks)

          for path in paths:
              print(f"--- FTP verify path: {path}")
              try:
                  for target in targets:
                      try:
                          data = fetch(path, target)
                          text = data[:200000].decode("utf-8", errors="ignore")
                          digest = hashlib.sha256(data).hexdigest()[:16]
                          build = re.search(r"<!DOCTYPE html><!--([^>]+)--><html", text)
                          details = [
                              f"bytes={len(data)}",
                              f"sha256={digest}",
                              f"has_caso={'caso-claro-serasa-anpd-compartilhamento-dados' in text}",
                          ]
                          if build:
                              details.append(f"build_id={build.group(1)}")
                          if target == "codex-deploy-marker.txt":
                              details.append(f"content={text.strip()}")
                          print(f"{target}: " + " ".join(details))
                      except Exception as exc:
                          print(f"{target}: missing ({exc.__class__.__name__})")
              except error_perm as exc:
                  print(f"unavailable: {exc}")
              except Exception as exc:
                  print(f"error: {exc.__class__.__name__}: {exc}")

          ftp.quit()
          PY
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}

name: Deploy static site to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:
  repository_dispatch:
    types:
      - wordpress_content_changed
  schedule:
    # Daily fallback in case the WordPress dispatch fails.
    - cron: "17 8 * * *"

concurrency:
  group: hostinger-static-site-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: hostinger
    timeout-minutes: 30
    env:
      HOSTINGER_FTP_PROTOCOL: ${{ secrets.HOSTINGER_FTP_PROTOCOL || vars.HOSTINGER_FTP_PROTOCOL || 'ftp' }}
      HOSTINGER_FTP_PORT: ${{ secrets.HOSTINGER_FTP_PORT || vars.HOSTINGER_FTP_PORT || 21 }}
      HOSTINGER_FTP_SERVER_DIR: "./public_html/"
      HOSTINGER_DRY_RUN: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Validate Hostinger deploy configuration
        run: |
          missing=0
          for name in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not configured in GitHub Actions secrets for the hostinger environment."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Hostinger deploy configuration is present. Values are intentionally hidden."
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://togetherprivacy.tech
          WORDPRESS_API_URL: https://togetherprivacy.tech/wp-json/wp/v2

      - name: Deploy out directory to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ${{ env.HOSTINGER_FTP_PROTOCOL }}
          port: ${{ env.HOSTINGER_FTP_PORT }}
          local-dir: ./out/
          server-dir: ${{ env.HOSTINGER_FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-static-site-v2.json
          dry-run: ${{ env.HOSTINGER_DRY_RUN }}
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/wp-admin/**
            **/wp-content/**
            **/wp-includes/**
            **/index.php
            **/wp-config.php
            **/wp-*.php
            **/xmlrpc.php
            **/license.txt
            **/readme.html
            **/.user.ini
